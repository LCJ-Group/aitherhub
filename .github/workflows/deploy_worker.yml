name: Deploy Worker to VM

on:
  push:
    branches:
      - master
    paths:
      - 'worker/**'
      - 'shared/**'
      - 'deploy/**'
      - 'gpu_vm/**'
      - 'requirements.txt'
      - 'backend/app/services/**'
      - '.github/workflows/deploy_worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker via SSH
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WORKER_SSH_KEY }}" > ~/.ssh/worker_key
          chmod 600 ~/.ssh/worker_key
          ssh-keyscan -H ${{ secrets.WORKER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Worker VM
        env:
          SSH_HOST: ${{ secrets.WORKER_SSH_HOST }}
          SSH_USER: ${{ secrets.WORKER_SSH_USER }}
        run: |
          ssh -i ~/.ssh/worker_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'DEPLOY_SCRIPT'
            set -e

            echo "=== AitherHub Worker Deploy ==="
            echo "Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            # ============================================================
            # 0. DISK CLEANUP — run FIRST to ensure space for pip/rsync
            # ============================================================
            echo ""
            echo "=== Disk status (before cleanup) ==="
            df -h / | tail -1

            echo "=== Disk investigation (top-level dirs) ==="
            sudo du -sh /opt/aitherhub 2>/dev/null || true
            sudo du -sh /var/www/aitherhub 2>/dev/null || true
            sudo du -sh /tmp 2>/dev/null || true
            sudo du -sh /var/log 2>/dev/null || true
            sudo du -sh /var/cache 2>/dev/null || true
            sudo du -sh /home 2>/dev/null || true
            sudo du -sh /root 2>/dev/null || true
            sudo du -sh /snap 2>/dev/null || true
            sudo du -sh /usr 2>/dev/null || true
            echo "=== Worker batch dirs ==="
            sudo du -sh /opt/aitherhub/worker/batch/uploadedvideo 2>/dev/null || true
            sudo du -sh /opt/aitherhub/worker/batch/output 2>/dev/null || true
            sudo du -sh /opt/aitherhub/worker/batch/splitvideo 2>/dev/null || true
            sudo du -sh /opt/aitherhub/worker/batch/artifacts 2>/dev/null || true
            sudo du -sh /opt/aitherhub/.venv 2>/dev/null || true
            sudo du -sh /opt/aitherhub/.git 2>/dev/null || true
            echo "=== Top 20 largest files on disk ==="
            sudo find / -xdev -type f -size +50M -exec ls -lh {} \; 2>/dev/null | sort -k5 -h -r | head -20 || true
            echo "=== /var/www/aitherhub batch dirs ==="
            sudo du -sh /var/www/aitherhub/worker/batch/uploadedvideo 2>/dev/null || true
            sudo du -sh /var/www/aitherhub/worker/batch/output 2>/dev/null || true
            sudo du -sh /var/www/aitherhub/worker/batch/splitvideo 2>/dev/null || true
            sudo du -sh /var/www/aitherhub/worker/batch/artifacts 2>/dev/null || true
            echo "=== Aggressive disk cleanup ==="
            # Remove ALL old files (no age limit for batch dirs)
            sudo rm -rf /opt/aitherhub/worker/batch/uploadedvideo/* 2>/dev/null || true
            sudo rm -rf /opt/aitherhub/worker/batch/output/* 2>/dev/null || true
            sudo rm -rf /opt/aitherhub/worker/batch/splitvideo/* 2>/dev/null || true
            sudo rm -rf /opt/aitherhub/worker/batch/artifacts/* 2>/dev/null || true
            sudo rm -rf /var/www/aitherhub/worker/batch/uploadedvideo/* 2>/dev/null || true
            sudo rm -rf /var/www/aitherhub/worker/batch/output/* 2>/dev/null || true
            sudo rm -rf /var/www/aitherhub/worker/batch/splitvideo/* 2>/dev/null || true
            sudo rm -rf /var/www/aitherhub/worker/batch/artifacts/* 2>/dev/null || true
            sudo rm -rf /tmp/aitherhub/* 2>/dev/null || true
            sudo rm -rf /root/.cache 2>/dev/null || true
            sudo rm -rf /home/*/.cache 2>/dev/null || true
            sudo apt-get clean -y 2>/dev/null || true
            sudo journalctl --vacuum-time=1d 2>/dev/null || true
            sudo find /opt/aitherhub -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
            sudo find /var/www/aitherhub -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
            sudo find /var/log -name "*.gz" -delete 2>/dev/null || true
            sudo find /var/log -name "*.1" -delete 2>/dev/null || true
            sudo find /tmp -type f -mmin +30 -delete 2>/dev/null || true
            # Remove legacy .venv and .git from /var/www/aitherhub (rsync excludes them but old copies remain)
            if [ -d "/var/www/aitherhub/.venv" ]; then
              echo "Removing legacy /var/www/aitherhub/.venv..."
              sudo find /var/www/aitherhub/.venv -delete 2>/dev/null || true
            fi
            if [ -d "/var/www/aitherhub/worker/.venv" ]; then
              echo "Removing legacy /var/www/aitherhub/worker/.venv..."
              sudo find /var/www/aitherhub/worker/.venv -delete 2>/dev/null || true
            fi
            if [ -d "/var/www/aitherhub/.git" ]; then
              echo "Removing legacy /var/www/aitherhub/.git..."
              sudo find /var/www/aitherhub/.git -delete 2>/dev/null || true
            fi

            echo "=== Disk status (after cleanup) ==="
            df -h / | tail -1

            # ============================================================
            # 1. STOP WORKERS FIRST (before code update)
            #    This prevents crash loops when new code has breaking
            #    changes and systemd Restart=always triggers restarts
            #    during the git reset / rsync window.
            # ============================================================
            echo ""
            echo "=== Stopping workers (graceful) ==="
            echo "Sending SIGTERM to workers..."
            sudo systemctl stop aither-worker 2>/dev/null || true
            sudo systemctl stop simple-worker 2>/dev/null || true

            # Wait up to 5 minutes for graceful shutdown
            GRACE_TIMEOUT=300
            GRACE_ELAPSED=0
            while [ $GRACE_ELAPSED -lt $GRACE_TIMEOUT ]; do
              AITHER_PID=$(systemctl show -p MainPID aither-worker 2>/dev/null | cut -d= -f2)
              SIMPLE_PID=$(systemctl show -p MainPID simple-worker 2>/dev/null | cut -d= -f2)
              if [ "${AITHER_PID:-0}" = "0" ] && [ "${SIMPLE_PID:-0}" = "0" ]; then
                echo "Workers stopped gracefully after ${GRACE_ELAPSED}s"
                break
              fi
              echo "Waiting for graceful shutdown... (${GRACE_ELAPSED}/${GRACE_TIMEOUT}s)"
              sleep 10
              GRACE_ELAPSED=$((GRACE_ELAPSED + 10))
            done

            # If still running after grace period, force kill
            if [ $GRACE_ELAPSED -ge $GRACE_TIMEOUT ]; then
              echo "Grace period expired, force killing..."
              sudo systemctl kill -s SIGKILL aither-worker 2>/dev/null || true
              sudo systemctl kill -s SIGKILL simple-worker 2>/dev/null || true
              sleep 2
            fi

            # Reset failure counters (prevents StartLimitBurst lockout)
            sudo systemctl reset-failed aither-worker 2>/dev/null || true
            sudo systemctl reset-failed simple-worker 2>/dev/null || true

            # ============================================================
            # 2. REPO UPDATE (workers are stopped, safe to update code)
            # ============================================================
            cd /opt/aitherhub
            git config --global --add safe.directory /opt/aitherhub
            echo "Before: $(git rev-parse HEAD)"
            git remote set-url origin https://github.com/LCJ-Group/aitherhub.git
            git fetch origin master --force
            git reset --hard origin/master
            echo "After:  $(git rev-parse HEAD)"

            # ============================================================
            # 3. SYNC to /var/www/aitherhub (legacy path)
            # ============================================================
            echo ""
            echo "=== Syncing to /var/www/aitherhub ==="
            if [ -d "/var/www/aitherhub" ]; then
              sudo rsync -a --delete \
                --exclude='.git' \
                --exclude='.venv' \
                --exclude='.env' \
                --exclude='__pycache__' \
                --exclude='*.pyc' \
                --exclude='worker/batch/uploadedvideo/' \
                --exclude='worker/batch/output/' \
                --exclude='worker/batch/splitvideo/' \
                --exclude='worker/batch/artifacts/' \
                /opt/aitherhub/ /var/www/aitherhub/
              RSYNC_EXIT=$?
              if [ $RSYNC_EXIT -eq 0 ] || [ $RSYNC_EXIT -eq 24 ]; then
                echo "Synced OK (exit=$RSYNC_EXIT)"
              else
                echo "rsync failed with exit code $RSYNC_EXIT"
                exit $RSYNC_EXIT
              fi
            else
              echo "/var/www/aitherhub does not exist — skipping"
            fi

            # ============================================================
            # 4. STALE LOCK CLEANUP
            # ============================================================
            LOCK_FILE="/tmp/simple_worker.lock"
            if [ -f "$LOCK_FILE" ]; then
              LOCK_PID=$(cat "$LOCK_FILE" 2>/dev/null || echo "")
              if [ -n "$LOCK_PID" ] && ! kill -0 "$LOCK_PID" 2>/dev/null; then
                rm -f "$LOCK_FILE"
                echo "Stale lock removed (PID $LOCK_PID dead)"
              fi
            fi

            # ============================================================
            # 5. VENV + DEPENDENCIES
            # ============================================================
            echo ""
            echo "=== Installing dependencies ==="
            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi
            .venv/bin/pip install -r requirements.txt --quiet 2>&1 | tail -3
            echo "Dependencies OK"

            # ============================================================
            # 6. START WORKERS (code is fully updated and synced)
            # ============================================================
            echo ""
            echo "=== Starting workers ==="
            # Install/update simple-worker service (KillMode=process for graceful shutdown)
            if [ -f deploy/simple-worker.service ]; then
              if [ ! -f /etc/systemd/system/simple-worker.service ] || \
                 ! diff -q deploy/simple-worker.service /etc/systemd/system/simple-worker.service >/dev/null 2>&1; then
                echo "Installing/updating simple-worker service..."
                sudo cp deploy/simple-worker.service /etc/systemd/system/
                sudo systemctl daemon-reload
                sudo systemctl enable simple-worker
              fi
            fi

            # Ensure aither-worker also uses KillMode=process (if service file exists)
            if [ -f /etc/systemd/system/aither-worker.service ]; then
              if ! grep -q 'KillMode=process' /etc/systemd/system/aither-worker.service; then
                echo "Adding KillMode=process to aither-worker.service..."
                sudo sed -i '/KillSignal=SIGTERM/a KillMode=process' /etc/systemd/system/aither-worker.service 2>/dev/null || \
                sudo sed -i '/\[Service\]/a KillMode=process' /etc/systemd/system/aither-worker.service
                sudo systemctl daemon-reload
              fi
            fi

            # Install/update encoding API service
            if [ -f gpu_vm/systemd/aither-encoding-api.service ]; then
              if [ ! -f /etc/systemd/system/aither-encoding-api.service ] || \
                 ! diff -q gpu_vm/systemd/aither-encoding-api.service /etc/systemd/system/aither-encoding-api.service >/dev/null 2>&1; then
                echo "Installing/updating encoding API service..."
                sudo cp gpu_vm/systemd/aither-encoding-api.service /etc/systemd/system/
                sudo systemctl daemon-reload
                sudo systemctl enable aither-encoding-api
              fi
            fi

            echo "Starting workers..."
            sudo systemctl start aither-worker 2>/dev/null || true
            sudo systemctl start simple-worker 2>/dev/null || true
            sudo systemctl restart aither-encoding-api 2>/dev/null || true
            sleep 10

            for i in 1 2 3 4 5 6; do
              AITHER=$(sudo systemctl is-active aither-worker 2>/dev/null || echo "inactive")
              SIMPLE=$(sudo systemctl is-active simple-worker 2>/dev/null || echo "inactive")
              if [ "$AITHER" = "active" ] || [ "$SIMPLE" = "active" ]; then
                echo "Worker is active (aither=$AITHER simple=$SIMPLE)"
                break
              fi
              # Also accept 'activating' as the worker may still be initializing
              if [ "$AITHER" = "activating" ] || [ "$SIMPLE" = "activating" ]; then
                echo "Worker is activating (aither=$AITHER simple=$SIMPLE), waiting..."
              else
                echo "Attempt $i: workers not active yet (aither=$AITHER simple=$SIMPLE)"
              fi
              sleep 10
            done

            # ============================================================
            # 7. VERIFY
            # ============================================================
            echo ""
            echo "=== Disk status (final) ==="
            df -h / | tail -1
            echo "=== Deploy complete ==="
            echo "Commit: $(git rev-parse HEAD)"
          DEPLOY_SCRIPT

      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.WORKER_SSH_HOST }}
          SSH_USER: ${{ secrets.WORKER_SSH_USER }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          DEPLOYED=$(ssh -i ~/.ssh/worker_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} \
            "cd /opt/aitherhub && git rev-parse HEAD")
          echo "Expected: ${COMMIT_SHA}"
          echo "Deployed: ${DEPLOYED}"
          if [ "${DEPLOYED}" = "${COMMIT_SHA}" ]; then
            echo "SUCCESS: Commit matches"
          else
            echo "WARNING: Commit mismatch"
            exit 1
          fi

      - name: Health check
        env:
          SSH_HOST: ${{ secrets.WORKER_SSH_HOST }}
          SSH_USER: ${{ secrets.WORKER_SSH_USER }}
        run: |
          ssh -i ~/.ssh/worker_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'HEALTHCHECK'
            AITHER=$(sudo systemctl is-active aither-worker 2>/dev/null || echo "inactive")
            SIMPLE=$(sudo systemctl is-active simple-worker 2>/dev/null || echo "inactive")
            ENCODING=$(sudo systemctl is-active aither-encoding-api 2>/dev/null || echo "inactive")
            echo "aither-worker: ${AITHER}"
            echo "simple-worker: ${SIMPLE}"
            echo "aither-encoding-api: ${ENCODING}"
            # Wait for worker to finish activating
            for HC_ATTEMPT in 1 2 3 4 5; do
              AITHER=$(sudo systemctl is-active aither-worker 2>/dev/null || echo "inactive")
              SIMPLE=$(sudo systemctl is-active simple-worker 2>/dev/null || echo "inactive")
              if [ "$AITHER" = "active" ] || [ "$SIMPLE" = "active" ]; then
                break
              fi
              if [ "$AITHER" = "activating" ] || [ "$SIMPLE" = "activating" ]; then
                echo "Worker still activating, waiting 10s... (attempt $HC_ATTEMPT/5)"
                sleep 10
              else
                break
              fi
            done
            echo "aither-worker: ${AITHER}"
            echo "simple-worker: ${SIMPLE}"
            if [ "$AITHER" = "active" ] || [ "$SIMPLE" = "active" ]; then
              echo "SUCCESS: Worker is running"
            else
              echo "FAIL: No worker is active"
              # Show journal for debugging
              echo "=== simple-worker journal (last 30 lines) ==="
              sudo journalctl -u simple-worker --no-pager -n 30 2>&1 || true
              echo "=== aither-worker journal (last 30 lines) ==="
              sudo journalctl -u aither-worker --no-pager -n 30 2>&1 || true
              exit 1
            fi
            if [ "$ENCODING" = "active" ]; then
              echo "SUCCESS: Encoding API is running"
            else
              echo "WARNING: Encoding API is not active"
            fi
            echo "=== Waiting 15s for worker to process queue ==="
            sleep 15
            echo "=== Worker journal (last 100 lines) ==="
            sudo journalctl -u aither-worker --no-pager -n 100 2>&1 || true
            echo "=== Encoding API journal (last 50 lines) ==="
            sudo journalctl -u aither-encoding-api --no-pager -n 50 2>&1 || true
            echo "=== Encoding API health check ==="
            curl -sf --max-time 5 http://localhost:8765/health 2>&1 || echo "Encoding API health check failed"
            echo "=== Disk ==="
            df -h / | tail -1
          HEALTHCHECK

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/worker_key
