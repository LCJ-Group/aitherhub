name: Deploy Worker to VM

on:
  push:
    branches:
      - master
    paths:
      - 'worker/**'
      - 'shared/**'
      - 'deploy/**'
      - 'requirements.txt'
      - 'backend/app/services/**'
      - '.github/workflows/deploy_worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker via SSH
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WORKER_SSH_KEY }}" > ~/.ssh/worker_key
          chmod 600 ~/.ssh/worker_key
          ssh-keyscan -H ${{ secrets.WORKER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Worker VM
        env:
          SSH_HOST: ${{ secrets.WORKER_SSH_HOST }}
          SSH_USER: ${{ secrets.WORKER_SSH_USER }}
        run: |
          ssh -i ~/.ssh/worker_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'DEPLOY_SCRIPT'
            set -e

            echo "=== AitherHub Worker Deploy ==="
            echo "Time: \$(date -u +%Y-%m-%dT%H:%M:%SZ)"

            # ============================================================
            # 0. DISK CLEANUP — run FIRST to ensure space for pip/rsync
            # ============================================================
            echo ""
            echo "=== Disk status (before cleanup) ==="
            df -h / | tail -1

            echo "=== Aggressive disk cleanup ==="
            sudo find /tmp/aitherhub -mindepth 1 -maxdepth 1 -mmin +60 -exec rm -rf {} + 2>/dev/null || true
            sudo find /opt/aitherhub/worker/batch/uploadedvideo -type f -mmin +60 -delete 2>/dev/null || true
            sudo find /opt/aitherhub/worker/batch/output -mindepth 1 -maxdepth 1 -mmin +60 -exec rm -rf {} + 2>/dev/null || true
            sudo find /opt/aitherhub/worker/batch/splitvideo -mindepth 1 -maxdepth 1 -mmin +60 -exec rm -rf {} + 2>/dev/null || true
            sudo find /opt/aitherhub/worker/batch/artifacts -mindepth 1 -maxdepth 1 -mmin +60 -exec rm -rf {} + 2>/dev/null || true
            sudo rm -rf /root/.cache/pip 2>/dev/null || true
            sudo rm -rf /home/*/.cache/pip 2>/dev/null || true
            sudo apt-get clean 2>/dev/null || true
            sudo journalctl --vacuum-time=1d 2>/dev/null || true
            sudo find /opt/aitherhub -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
            sudo find /var/www/aitherhub -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true

            echo "=== Disk status (after cleanup) ==="
            df -h / | tail -1

            # ============================================================
            # 1. REPO UPDATE
            # ============================================================
            cd /opt/aitherhub
            git config --global --add safe.directory /opt/aitherhub
            echo "Before: \$(git rev-parse HEAD)"
            git remote set-url origin https://github.com/LCJ-Group/aitherhub.git
            git fetch origin master --force
            git reset --hard origin/master
            echo "After:  \$(git rev-parse HEAD)"

            # ============================================================
            # 2. SYNC to /var/www/aitherhub (legacy path)
            # ============================================================
            echo ""
            echo "=== Syncing to /var/www/aitherhub ==="
            if [ -d "/var/www/aitherhub" ]; then
              sudo rsync -a --delete \
                --exclude='.git' \
                --exclude='.venv' \
                --exclude='.env' \
                --exclude='__pycache__' \
                --exclude='*.pyc' \
                --exclude='worker/batch/uploadedvideo/' \
                --exclude='worker/batch/output/' \
                --exclude='worker/batch/splitvideo/' \
                --exclude='worker/batch/artifacts/' \
                /opt/aitherhub/ /var/www/aitherhub/ || {
                RSYNC_EXIT=\$?
                if [ \$RSYNC_EXIT -eq 24 ]; then
                  echo "rsync: vanished files (exit 24) — safe to ignore"
                else
                  echo "rsync failed with exit code \$RSYNC_EXIT"
                  exit \$RSYNC_EXIT
                fi
              }
              echo "Synced OK"
            else
              echo "/var/www/aitherhub does not exist — skipping"
            fi

            # ============================================================
            # 3. STALE LOCK CLEANUP
            # ============================================================
            LOCK_FILE="/tmp/simple_worker.lock"
            if [ -f "\$LOCK_FILE" ]; then
              LOCK_PID=\$(cat "\$LOCK_FILE" 2>/dev/null || echo "")
              if [ -n "\$LOCK_PID" ] && ! kill -0 "\$LOCK_PID" 2>/dev/null; then
                rm -f "\$LOCK_FILE"
                echo "Stale lock removed (PID \$LOCK_PID dead)"
              fi
            fi

            # ============================================================
            # 4. VENV + DEPENDENCIES
            # ============================================================
            echo ""
            echo "=== Installing dependencies ==="
            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi
            .venv/bin/pip install -r requirements.txt --quiet 2>&1 | tail -3
            echo "Dependencies OK"

            # ============================================================
            # 5. RESTART WORKER
            # ============================================================
            echo ""
            echo "=== Restarting worker ==="
            sudo systemctl restart aither-worker 2>/dev/null || true
            sudo systemctl restart simple-worker 2>/dev/null || true
            sleep 5

            for i in 1 2 3; do
              AITHER=\$(sudo systemctl is-active aither-worker 2>/dev/null || echo "inactive")
              SIMPLE=\$(sudo systemctl is-active simple-worker 2>/dev/null || echo "inactive")
              if [ "\$AITHER" = "active" ] || [ "\$SIMPLE" = "active" ]; then
                echo "Worker is active (aither=\$AITHER simple=\$SIMPLE)"
                break
              fi
              echo "Attempt \$i: waiting 5s..."
              sleep 5
            done

            # ============================================================
            # 6. VERIFY
            # ============================================================
            echo ""
            echo "=== Disk status (final) ==="
            df -h / | tail -1
            echo "=== Deploy complete ==="
            echo "Commit: \$(git rev-parse HEAD)"
          DEPLOY_SCRIPT

      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.WORKER_SSH_HOST }}
          SSH_USER: ${{ secrets.WORKER_SSH_USER }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          DEPLOYED=\$(ssh -i ~/.ssh/worker_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} \
            "cd /opt/aitherhub && git rev-parse HEAD")
          echo "Expected: ${COMMIT_SHA}"
          echo "Deployed: ${DEPLOYED}"
          if [ "${DEPLOYED}" = "${COMMIT_SHA}" ]; then
            echo "SUCCESS: Commit matches"
          else
            echo "WARNING: Commit mismatch"
            exit 1
          fi

      - name: Health check
        env:
          SSH_HOST: ${{ secrets.WORKER_SSH_HOST }}
          SSH_USER: ${{ secrets.WORKER_SSH_USER }}
        run: |
          ssh -i ~/.ssh/worker_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'HEALTHCHECK'
            AITHER=\$(sudo systemctl is-active aither-worker 2>/dev/null || echo "inactive")
            SIMPLE=\$(sudo systemctl is-active simple-worker 2>/dev/null || echo "inactive")
            echo "aither-worker: ${AITHER}"
            echo "simple-worker: ${SIMPLE}"
            if [ "${AITHER}" = "active" ] || [ "${SIMPLE}" = "active" ]; then
              echo "SUCCESS: Worker is running"
            else
              echo "FAIL: No worker is active"
              exit 1
            fi
            echo "=== Waiting 15s for worker to process queue ==="
            sleep 15
            echo "=== Worker journal (last 100 lines) ==="
            sudo journalctl -u aither-worker --no-pager -n 100 2>&1 || true
            echo "=== Disk ==="
            df -h / | tail -1
          HEALTHCHECK

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/worker_key
