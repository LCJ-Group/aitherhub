name: Build & Deploy GPU Worker

on:
  push:
    branches: [master]
    paths:
      - 'gpu-worker/serverless/**'
      - 'gpu-worker/live_engine.py'
      - 'gpu-worker/liveportrait_engine.py'
      - 'gpu-worker/imtalker_generate_patch.py'
      - '.github/workflows/build-gpu-worker.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lcj-group/aitherhub-gpu-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: gpu-worker/serverless/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-runpod:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Update RunPod template with new image
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_TEMPLATE_ID: ${{ secrets.RUNPOD_TEMPLATE_ID }}
          RUNPOD_REGISTRY_AUTH_ID: ${{ secrets.RUNPOD_REGISTRY_AUTH_ID }}
          SHA_SHORT: ${{ needs.build-and-push.outputs.sha_short }}
        run: |
          NEW_IMAGE="ghcr.io/lcj-group/aitherhub-gpu-worker:${SHA_SHORT}"
          echo "Deploying image: ${NEW_IMAGE}"

          # Update RunPod template to use the new GHCR image
          RESPONSE=$(curl -s -X POST "https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { saveTemplate(input: { id: \\\"${RUNPOD_TEMPLATE_ID}\\\", imageName: \\\"${NEW_IMAGE}\\\", containerRegistryAuthId: \\\"${RUNPOD_REGISTRY_AUTH_ID}\\\" }) { id imageName } }\"
            }")

          echo "RunPod API response: ${RESPONSE}"

          # Verify the update
          if echo "${RESPONSE}" | grep -q "errors"; then
            echo "ERROR: Failed to update RunPod template"
            echo "${RESPONSE}" | python3 -m json.tool 2>/dev/null || echo "${RESPONSE}"
            exit 1
          fi

          echo "SUCCESS: RunPod template updated to ${NEW_IMAGE}"
