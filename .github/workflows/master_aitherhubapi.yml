name: Build and deploy Python app to Azure Web App - aitherhubAPI

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-aitherhubapi
  cancel-in-progress: true

jobs:
  pre_deploy_check:
    runs-on: ubuntu-latest
    name: Pre-deploy smoke test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run startup smoke test
        run: python tests/test_startup_smoke.py

      - name: Run import boundary tests
        run: python tests/test_import_boundaries.py

  build_and_deploy:
    needs: pre_deploy_check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.10 (matching Azure runtime)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build antenv with dependencies
        working-directory: backend
        run: |
          echo "Building antenv with pip install..."
          python -m venv antenv
          source antenv/bin/activate
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir gunicorn
          deactivate

          # Fix pyvenv.cfg to use Azure's Python path
          echo "[deploy] Fixing pyvenv.cfg for Azure compatibility..."
          sed -i 's|home = .*|home = /opt/python/latest/bin|' antenv/pyvenv.cfg
          cat antenv/pyvenv.cfg

          # Fix shebangs in bin/ scripts to use Azure's Python
          echo "[deploy] Fixing shebangs in antenv/bin/..."
          find antenv/bin -type f -exec grep -l "^#!.*python" {} \; | while read f; do
            sed -i "1s|^#!.*python.*|#!/opt/python/latest/bin/python|" "$f"
          done

          # Remove unnecessary files to reduce zip size
          echo "[deploy] Cleaning up antenv..."
          find antenv -name "*.pyc" -delete 2>/dev/null || true
          find antenv -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find antenv -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true
          find antenv -name "tests" -type d -exec rm -rf {} + 2>/dev/null || true
          find antenv -name "test" -type d -exec rm -rf {} + 2>/dev/null || true
          rm -rf antenv/share 2>/dev/null || true

          echo "[deploy] antenv size: $(du -sh antenv | cut -f1)"

      - name: Create deploy package
        run: |
          cd backend

          # Clean up code artifacts
          find . -name "__pycache__" -type d -not -path "./antenv/*" -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -not -path "./antenv/*" -delete 2>/dev/null || true
          rm -rf .pytest_cache .venv

          # Create zip with code + antenv
          zip -r ../deploy.zip . \
            -x ".pytest_cache/*" \
            -x ".venv/*"

          cd ..
          echo "deploy.zip size: $(ls -lh deploy.zip | awk '{print $5}')"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AA4E9EC299D1433D9FF12541F06BA50D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AE01A735F8B046C49C5F169706AC5842 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8E4F3767CE0647AEAA62C4C721F843FE }}

      - name: Disable Oryx build before deploy
        run: |
          az webapp config appsettings set \
            --resource-group rg-vdp-kyogoku \
            --name aitherhubAPI \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT="false" \
              ENABLE_ORYX_BUILD="false" \
            --output none
          echo "Oryx build disabled. Waiting 10s for settings to propagate..."
          sleep 10

      - name: Deploy to Azure Web App (Oryx disabled)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'aitherhubAPI'
          package: deploy.zip

      - name: Update app settings (after deploy to avoid SCM restart conflict)
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          az webapp config appsettings set \
            --resource-group rg-vdp-kyogoku \
            --name aitherhubAPI \
            --settings \
              GIT_COMMIT_SHA="$SHORT_SHA" \
              GIT_BRANCH="${{ github.ref_name }}" \
              BUILD_TIME="$BUILD_TIME" \
              DEPLOY_TIME="$BUILD_TIME" \
              WEBSITES_CONTAINER_START_TIME_LIMIT="1800" \
            --output none

      - name: Restart app to pick up new code and settings
        run: |
          az webapp restart \
            --resource-group rg-vdp-kyogoku \
            --name aitherhubAPI \
            2>&1 || echo "::warning::Restart failed"

      - name: Logout from Azure
        if: always()
        run: az logout

  verify_deploy:
    needs: build_and_deploy
    if: always() && needs.build_and_deploy.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Wait for app startup
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          SHORT_SHA="${EXPECTED_COMMIT:0:7}"
          echo "Expected commit: $SHORT_SHA"
          echo "Waiting for app to start with pre-built antenv..."
          echo ""

          VERIFIED=false
          MAX_ATTEMPTS=50
          INTERVAL=30

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -sf --connect-timeout 10 --max-time 15 "$API_URL/version" 2>/dev/null || echo "")

            if [ -n "$RESPONSE" ]; then
              CURRENT_COMMIT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('commit',''))" 2>/dev/null || echo "")
              UPTIME=$(echo "$RESPONSE" | python3 -c "import sys,json; print(f'{json.load(sys.stdin).get(\"uptime_seconds\",0):.0f}')" 2>/dev/null || echo "?")

              echo "Attempt $i/$MAX_ATTEMPTS: commit=$CURRENT_COMMIT, uptime=${UPTIME}s"

              if [ "$CURRENT_COMMIT" = "$SHORT_SHA" ]; then
                echo ""
                echo "Deploy verified: commit $SHORT_SHA is live."
                VERIFIED=true
                break
              else
                echo "  (waiting for $SHORT_SHA, currently $CURRENT_COMMIT)"
              fi
            else
              echo "Attempt $i/$MAX_ATTEMPTS: API not responding yet"
            fi

            sleep $INTERVAL
          done

          if [ "$VERIFIED" != "true" ]; then
            echo ""
            echo "::warning::Deploy verification timed out."
          fi

      - name: Final health check
        if: always()
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          echo "=== Version ==="
          curl -sf --max-time 15 "$API_URL/version" 2>/dev/null || echo "No response"
          echo ""
          echo "=== Root ==="
          curl -sf --max-time 15 "$API_URL/" 2>/dev/null || echo "No response"
          echo ""
          echo "=== Auto-video health ==="
          curl -sf --max-time 15 "$API_URL/api/v1/auto-video/health" 2>/dev/null || echo "No response"
