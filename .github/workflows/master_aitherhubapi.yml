name: Build and deploy Python app to Azure Web App - aitherhubAPI

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-aitherhubapi
  cancel-in-progress: true

jobs:
  pre_deploy_check:
    runs-on: ubuntu-latest
    name: Pre-deploy smoke test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run startup smoke test
        run: python tests/test_startup_smoke.py

      - name: Run import boundary tests
        run: python tests/test_import_boundaries.py

  build_and_deploy:
    needs: pre_deploy_check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build antenv virtual environment
        working-directory: backend
        run: |
          echo "Creating antenv virtual environment with Python 3.10..."
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "antenv size:"
          du -sh antenv
          echo "Python version in antenv: $(python --version)"
          deactivate

      - name: Create deploy zip (code + antenv)
        run: |
          cd backend
          # Clean up unnecessary files
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true
          rm -rf .pytest_cache
          echo "Backend size (with antenv):"
          du -sh .
          # Create zip
          zip -r ../deploy.zip . -x ".pytest_cache/*" -x "__pycache__/*" -x "*.pyc"
          cd ..
          ls -lh deploy.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AA4E9EC299D1433D9FF12541F06BA50D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AE01A735F8B046C49C5F169706AC5842 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8E4F3767CE0647AEAA62C4C721F843FE }}

      - name: Configure Azure App Settings
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Setting version info: commit=$SHORT_SHA, build_time=$BUILD_TIME"
          az webapp config appsettings set \
            --resource-group rg-vdp-kyogoku \
            --name aitherhubAPI \
            --settings \
              GIT_COMMIT_SHA="$SHORT_SHA" \
              GIT_BRANCH="${{ github.ref_name }}" \
              BUILD_TIME="$BUILD_TIME" \
              DEPLOY_TIME="$BUILD_TIME" \
              SCM_DO_BUILD_DURING_DEPLOYMENT="false" \
              ENABLE_ORYX_BUILD="false" \
              WEBSITES_CONTAINER_START_TIME_LIMIT="1800" \
            --output none

      - name: Deploy zip to Azure Web App
        run: |
          echo "Deploying zip package (antenv included, no Oryx build needed)..."
          az webapp deploy \
            --resource-group rg-vdp-kyogoku \
            --name aitherhubAPI \
            --src-path deploy.zip \
            --type zip \
            --async true
          echo "Zip deploy initiated."

      - name: Restart app
        run: |
          echo "Restarting app to pick up new code..."
          az webapp restart \
            --resource-group rg-vdp-kyogoku \
            --name aitherhubAPI
          echo "App restart triggered. antenv is pre-built, startup will be fast."

      - name: Logout from Azure
        if: always()
        run: az logout

  verify_deploy:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for app startup
        run: |
          echo "Waiting 2 minutes for app startup (antenv pre-built, no pip install needed)..."
          sleep 120

      - name: Verify API is responding
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          echo "Checking aitherhubAPI health at $API_URL ..."
          SUCCESS=false
          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              --connect-timeout 10 --max-time 30 \
              "$API_URL/" 2>/dev/null || echo "000")
            BODY=$(cat /tmp/response.json 2>/dev/null || echo "")
            echo "Attempt $i: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              SUCCESS=true
              echo "API is healthy! Response: $BODY"
              break
            fi
            echo "Waiting 30s before retry..."
            sleep 30
          done

          if [ "$SUCCESS" != "true" ]; then
            echo ""
            echo "::warning::API did not return 200 after 20 attempts."
            echo "Check Azure App Service logs for startup progress."
          fi

      - name: Check version endpoint
        if: always()
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          RESPONSE=$(curl -sf --connect-timeout 10 --max-time 15 \
            "$API_URL/version" 2>/dev/null || echo "{}")
          echo "Version info: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          commit = data.get('commit', 'unknown')
          uptime = data.get('uptime_seconds', -1)
          print(f'Deployed commit: {commit}')
          print(f'Uptime: {uptime}s')
          " 2>/dev/null || echo "Could not parse version response"

      - name: Check auto-video health
        if: always()
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          RESPONSE=$(curl -sf --connect-timeout 10 --max-time 15 \
            "$API_URL/api/v1/auto-video/health" 2>/dev/null || echo "{}")
          echo "Auto-video health: $RESPONSE"
