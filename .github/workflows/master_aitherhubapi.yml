name: Build and deploy Python app to Azure Web App - aitherhubAPI

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-aitherhubapi
  cancel-in-progress: true

jobs:
  pre_deploy_check:
    runs-on: ubuntu-latest
    name: Pre-deploy smoke test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run startup smoke test
        run: python tests/test_startup_smoke.py

      - name: Run import boundary tests
        run: python tests/test_import_boundaries.py

  build_and_deploy:
    needs: pre_deploy_check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    outputs:
      deploy_attempted: ${{ steps.deploy.outcome }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build antenv virtual environment
        working-directory: backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          deactivate
          echo "antenv size: $(du -sh antenv | cut -f1)"

      - name: Create deploy zip (code + antenv)
        run: |
          cd backend
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true
          rm -rf .pytest_cache
          rm -rf antenv/lib/python3.10/site-packages/pip 2>/dev/null || true
          rm -rf antenv/lib/python3.10/site-packages/setuptools 2>/dev/null || true
          zip -r ../deploy.zip . -x ".pytest_cache/*" -x "*.pyc" -x "__pycache__/*"
          cd ..
          echo "deploy.zip size: $(ls -lh deploy.zip | awk '{print $5}')"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AA4E9EC299D1433D9FF12541F06BA50D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AE01A735F8B046C49C5F169706AC5842 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8E4F3767CE0647AEAA62C4C721F843FE }}

      - name: Configure Azure App Settings
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          az webapp config appsettings set \
            --resource-group rg-vdp-kyogoku \
            --name aitherhubAPI \
            --settings \
              GIT_COMMIT_SHA="$SHORT_SHA" \
              GIT_BRANCH="${{ github.ref_name }}" \
              BUILD_TIME="$BUILD_TIME" \
              DEPLOY_TIME="$BUILD_TIME" \
              SCM_DO_BUILD_DURING_DEPLOYMENT="false" \
              ENABLE_ORYX_BUILD="false" \
              WEBSITES_CONTAINER_START_TIME_LIMIT="1800" \
            --output none

      - name: Deploy zip to Azure via Kudu API
        id: deploy
        continue-on-error: true
        run: |
          echo "Deploying via Kudu ZipDeploy REST API..."
          echo "Zip size: $(ls -lh deploy.zip | awk '{print $5}')"

          # Get publish credentials
          CREDS=$(az webapp deployment list-publishing-credentials \
            --resource-group rg-vdp-kyogoku \
            --name aitherhubAPI \
            --query "{username:publishingUserName, password:publishingPassword}" \
            --output json)
          USERNAME=$(echo "$CREDS" | python3 -c "import sys,json; print(json.load(sys.stdin)['username'])")
          PASSWORD=$(echo "$CREDS" | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")

          KUDU_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.scm.japaneast-01.azurewebsites.net"

          # Upload zip via Kudu ZipDeploy API (async=1 to avoid timeout)
          echo "Uploading to Kudu ZipDeploy API (async mode)..."
          HTTP_CODE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            --connect-timeout 30 \
            --max-time 600 \
            -X POST \
            -u "$USERNAME:$PASSWORD" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "$KUDU_URL/api/zipdeploy?isAsync=true")

          echo "Kudu response: HTTP $HTTP_CODE"
          cat /tmp/deploy_response.txt 2>/dev/null || true
          echo ""

          if [ "$HTTP_CODE" = "202" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Zip accepted by Kudu (HTTP $HTTP_CODE). Build runs in background."
          elif [ "$HTTP_CODE" = "502" ] || [ "$HTTP_CODE" = "504" ]; then
            echo "::warning::Kudu returned HTTP $HTTP_CODE (gateway timeout)."
            echo "This is expected for large zips. Kudu processes in background."
            echo "verify_deploy will confirm when the new code is live."
          else
            echo "::error::Unexpected HTTP $HTTP_CODE from Kudu."
            cat /tmp/deploy_response.txt 2>/dev/null || true
            exit 1
          fi

      - name: Logout from Azure
        if: always()
        run: az logout

  verify_deploy:
    needs: build_and_deploy
    if: always() && needs.build_and_deploy.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for Kudu build and app startup
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          SHORT_SHA="${EXPECTED_COMMIT:0:7}"
          echo "Expected commit: $SHORT_SHA"
          echo "Deploy step outcome: ${{ needs.build_and_deploy.outputs.deploy_attempted }}"
          echo "Waiting for Kudu to finish building and app to start..."
          echo "This may take 10-15 minutes for large zips."
          echo ""

          VERIFIED=false
          MAX_ATTEMPTS=40
          INTERVAL=30

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -sf --connect-timeout 10 --max-time 15 "$API_URL/version" 2>/dev/null || echo "")

            if [ -n "$RESPONSE" ]; then
              CURRENT_COMMIT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('commit',''))" 2>/dev/null || echo "")
              UPTIME=$(echo "$RESPONSE" | python3 -c "import sys,json; print(f'{json.load(sys.stdin).get(\"uptime_seconds\",0):.0f}')" 2>/dev/null || echo "?")

              echo "Attempt $i/$MAX_ATTEMPTS: commit=$CURRENT_COMMIT, uptime=${UPTIME}s"

              if [ "$CURRENT_COMMIT" = "$SHORT_SHA" ]; then
                echo ""
                echo "Deploy verified: commit $SHORT_SHA is live."
                VERIFIED=true
                break
              else
                echo "  (waiting for $SHORT_SHA, currently $CURRENT_COMMIT)"
              fi
            else
              echo "Attempt $i/$MAX_ATTEMPTS: API not responding (building or restarting)"
            fi

            sleep $INTERVAL
          done

          if [ "$VERIFIED" != "true" ]; then
            echo ""
            echo "::warning::Deploy verification timed out after $((MAX_ATTEMPTS * INTERVAL))s."
            echo "The deploy may still be in progress. Check /version manually."
            exit 1
          fi

      - name: Final health check
        if: always()
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          echo "=== Version ==="
          curl -sf --max-time 15 "$API_URL/version" 2>/dev/null || echo "No response"
          echo ""
          echo "=== Root ==="
          curl -sf --max-time 15 "$API_URL/" 2>/dev/null || echo "No response"
          echo ""
          echo "=== Auto-video health ==="
          curl -sf --max-time 15 "$API_URL/api/v1/auto-video/health" 2>/dev/null || echo "No response"
          echo ""
          echo "=== Digital Human health ==="
          curl -sf --max-time 15 "$API_URL/api/v1/digital-human/health" 2>/dev/null || echo "No response"
