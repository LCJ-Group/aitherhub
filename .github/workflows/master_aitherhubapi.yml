name: Build and deploy Python app to Azure Web App - aitherhubAPI

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-aitherhubapi
  cancel-in-progress: true

jobs:
  pre_deploy_check:
    runs-on: ubuntu-latest
    name: Pre-deploy smoke test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run startup smoke test
        run: python tests/test_startup_smoke.py

      - name: Run import boundary tests
        run: python tests/test_import_boundaries.py

  build_and_deploy:
    needs: pre_deploy_check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create venv and install dependencies (backend only)
        working-directory: backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AA4E9EC299D1433D9FF12541F06BA50D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AE01A735F8B046C49C5F169706AC5842 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8E4F3767CE0647AEAA62C4C721F843FE }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        timeout-minutes: 10
        with:
          app-name: aitherhubAPI
          slot-name: Production
          package: backend
          clean: true
          restart: true

  verify_deploy:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment propagation
        run: sleep 180

      - name: Verify API is responding
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          echo "Checking aitherhubAPI health at $API_URL ..."
          SUCCESS=false
          for i in 1 2 3 4 5 6 7 8; do
            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              --connect-timeout 10 --max-time 30 \
              "$API_URL/" 2>/dev/null || echo "000")
            BODY=$(cat /tmp/response.json 2>/dev/null || echo "")
            echo "Attempt $i: HTTP $HTTP_CODE — $BODY"

            if [ "$HTTP_CODE" = "200" ]; then
              SUCCESS=true
              echo "API is healthy!"
              break
            fi
            echo "Waiting 30s before retry..."
            sleep 30
          done

          if [ "$SUCCESS" != "true" ]; then
            echo ""
            echo "::error::DEPLOY VERIFICATION FAILED — API did not return 200 after 8 attempts"
            echo "The server may have crashed on startup. Check Azure App Service logs."
            exit 1
          fi

      - name: Check version endpoint
        if: success()
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          RESPONSE=$(curl -sf --connect-timeout 10 --max-time 15 \
            "$API_URL/version" 2>/dev/null || echo "{}")
          echo "Version info: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          commit = data.get('commit', 'unknown')
          uptime = data.get('uptime_seconds', -1)
          print(f'Deployed commit: {commit}')
          print(f'Uptime: {uptime}s')
          " 2>/dev/null || echo "Could not parse version response"

      - name: Check auto-video health
        if: success()
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          RESPONSE=$(curl -sf --connect-timeout 10 --max-time 15 \
            "$API_URL/api/v1/auto-video/health" 2>/dev/null || echo "{}")
          echo "Auto-video health: $RESPONSE"
