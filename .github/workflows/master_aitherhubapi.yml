name: Build and deploy Python app to Azure Web App - aitherhubAPI

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-aitherhubapi
  cancel-in-progress: true

jobs:
  pre_deploy_check:
    runs-on: ubuntu-latest
    name: Pre-deploy smoke test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run startup smoke test
        run: python tests/test_startup_smoke.py

      - name: Run import boundary tests
        run: python tests/test_import_boundaries.py

  build_and_deploy:
    needs: pre_deploy_check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create deploy package (code only, no antenv)
        run: |
          cd backend
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true
          rm -rf .pytest_cache antenv .venv
          zip -r ../deploy.zip . -x ".pytest_cache/*" -x "*.pyc" -x "__pycache__/*" -x "antenv/*" -x ".venv/*"
          cd ..
          echo "deploy.zip size: $(ls -lh deploy.zip | awk '{print $5}')"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AA4E9EC299D1433D9FF12541F06BA50D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AE01A735F8B046C49C5F169706AC5842 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8E4F3767CE0647AEAA62C4C721F843FE }}

      - name: Configure Azure App Settings
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          az webapp config appsettings set \
            --resource-group rg-vdp-kyogoku \
            --name aitherhubAPI \
            --settings \
              GIT_COMMIT_SHA="$SHORT_SHA" \
              GIT_BRANCH="${{ github.ref_name }}" \
              BUILD_TIME="$BUILD_TIME" \
              DEPLOY_TIME="$BUILD_TIME" \
              SCM_DO_BUILD_DURING_DEPLOYMENT="false" \
              ENABLE_ORYX_BUILD="false" \
              WEBSITES_CONTAINER_START_TIME_LIMIT="1800" \
            --output none

      - name: Deploy zip to Azure (skip Oryx)
        continue-on-error: true
        id: deploy_step
        run: |
          echo "Deploying with Oryx build DISABLED (SCM_DO_BUILD=false)"
          echo "startup.sh will pip install requirements on first boot"
          az webapp deploy \
            --resource-group rg-vdp-kyogoku \
            --name aitherhubAPI \
            --src-path deploy.zip \
            --type zip \
            --async true \
            --timeout 60 \
            2>&1 || echo "::warning::Deploy command returned non-zero (expected with --async)"

      - name: Restart app to pick up new code
        run: |
          echo "Restarting app to ensure clean startup with new code..."
          az webapp restart \
            --resource-group rg-vdp-kyogoku \
            --name aitherhubAPI \
            2>&1 || echo "::warning::Restart command failed"

      - name: Logout from Azure
        if: always()
        run: az logout

  verify_deploy:
    needs: build_and_deploy
    if: always() && needs.build_and_deploy.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Wait for app startup (pip install + gunicorn)
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          SHORT_SHA="${EXPECTED_COMMIT:0:7}"
          echo "Expected commit: $SHORT_SHA"
          echo "Waiting for startup.sh to pip install and start gunicorn..."
          echo "This may take 5-10 minutes on first deploy (pip install)."
          echo ""

          VERIFIED=false
          MAX_ATTEMPTS=50
          INTERVAL=30

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -sf --connect-timeout 10 --max-time 15 "$API_URL/version" 2>/dev/null || echo "")

            if [ -n "$RESPONSE" ]; then
              CURRENT_COMMIT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('commit',''))" 2>/dev/null || echo "")
              UPTIME=$(echo "$RESPONSE" | python3 -c "import sys,json; print(f'{json.load(sys.stdin).get(\"uptime_seconds\",0):.0f}')" 2>/dev/null || echo "?")

              echo "Attempt $i/$MAX_ATTEMPTS: commit=$CURRENT_COMMIT, uptime=${UPTIME}s"

              if [ "$CURRENT_COMMIT" = "$SHORT_SHA" ]; then
                echo ""
                echo "Deploy verified: commit $SHORT_SHA is live."
                VERIFIED=true
                break
              else
                echo "  (waiting for $SHORT_SHA, currently $CURRENT_COMMIT)"
              fi
            else
              echo "Attempt $i/$MAX_ATTEMPTS: API not responding (pip installing or app restarting)"
            fi

            sleep $INTERVAL
          done

          if [ "$VERIFIED" != "true" ]; then
            echo ""
            echo "::warning::Deploy verification timed out after $((MAX_ATTEMPTS * INTERVAL))s."
            echo "The deploy may still be in progress. Check /version manually."
          fi

      - name: Final health check
        if: always()
        run: |
          API_URL="https://aitherhubapi-cpcjcnezbgf5f7e2.japaneast-01.azurewebsites.net"
          echo "=== Version ==="
          curl -sf --max-time 15 "$API_URL/version" 2>/dev/null || echo "No response"
          echo ""
          echo "=== Root ==="
          curl -sf --max-time 15 "$API_URL/" 2>/dev/null || echo "No response"
          echo ""
          echo "=== Auto-video health ==="
          curl -sf --max-time 15 "$API_URL/api/v1/auto-video/health" 2>/dev/null || echo "No response"
          echo ""
          echo "=== Digital Human health ==="
          curl -sf --max-time 15 "$API_URL/api/v1/digital-human/health" 2>/dev/null || echo "No response"
